name: Build macOS Apple Silicon

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-apple:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate
          pnpm install --no-frozen-lockfile

      - name: Build Apple Silicon DMG and ZIP
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npx electron-builder --mac dmg zip --arm64 --publish never
          node build/rename-mac-artifacts.js

      - name: Write SHA256 checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 Mineradio-*-mac-apple.dmg Mineradio-*-mac-apple.zip > SHA256SUMS-mac-apple.txt
          cat SHA256SUMS-mac-apple.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineradio-mac-apple
          path: |
            dist/Mineradio-*-mac-apple.dmg
            dist/Mineradio-*-mac-apple.zip
            dist/SHA256SUMS-mac-apple.txt
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Mineradio-*-mac-apple.dmg
            dist/Mineradio-*-mac-apple.zip
            dist/SHA256SUMS-mac-apple.txt
