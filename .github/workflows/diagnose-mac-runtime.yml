name: Diagnose macOS Runtime

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Use npm metadata for electron-builder
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); delete pkg.packageManager; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"

      - name: Build mac app and DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dir dmg --arm64 --publish never

      - name: Smoke test unpacked runtime
        shell: bash
        run: |
          set -u
          APP_BIN="dist/mac-arm64/Mineradio.app/Contents/MacOS/Mineradio"
          if [ ! -x "$APP_BIN" ]; then
            echo "Missing app binary: $APP_BIN"
            find dist -maxdepth 4 -type f | sort
            exit 1
          fi

          export ELECTRON_ENABLE_LOGGING=1
          export ELECTRON_ENABLE_STACK_DUMPING=1
          "$APP_BIN" --enable-logging --v=1 > mac-runtime.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"

          SERVER_OK=0
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3000/ > home.html 2>> mac-runtime.log; then
              SERVER_OK=1
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "app process exited before server was reachable"
              break
            fi
            sleep 1
          done
          echo "SERVER_OK=$SERVER_OK"

          if [ "$SERVER_OK" = "1" ]; then
            curl -sS -D login-status.headers http://127.0.0.1:3000/api/login/status -o login-status.json || true
            curl -sS -D qq-status.headers http://127.0.0.1:3000/api/qq/login/status -o qq-status.json || true
            curl -sS -D search.headers 'http://127.0.0.1:3000/api/search?keywords=test&limit=1' -o search.json || true
          fi

          sleep 4
          if kill -0 "$APP_PID" 2>/dev/null; then
            kill "$APP_PID" || true
          fi
          sleep 1

          echo "===== mac-runtime.log tail ====="
          tail -240 mac-runtime.log || true
          echo "===== home size ====="
          wc -c home.html 2>/dev/null || true
          echo "===== login status ====="
          cat login-status.json 2>/dev/null || true
          echo
          echo "===== qq status ====="
          cat qq-status.json 2>/dev/null || true
          echo
          echo "===== search ====="
          head -c 1200 search.json 2>/dev/null || true
          echo

          test "$SERVER_OK" = "1"

      - name: Smoke test DMG runtime
        shell: bash
        run: |
          set -u
          DMG="$(find dist -maxdepth 1 -name 'Mineradio-*-arm64.dmg' -print -quit)"
          if [ -z "$DMG" ]; then
            echo "Missing DMG"
            find dist -maxdepth 2 -type f | sort
            exit 1
          fi
          hdiutil verify "$DMG"
          MOUNT_OUTPUT="$(hdiutil attach "$DMG" -nobrowse -readonly)"
          echo "$MOUNT_OUTPUT"
          VOLUME="$(echo "$MOUNT_OUTPUT" | awk '/\/Volumes\//{print substr($0, index($0, "/Volumes/")); exit}')"
          if [ -z "$VOLUME" ]; then
            echo "Failed to resolve mounted volume"
            exit 1
          fi
          APP_BIN="$VOLUME/Mineradio.app/Contents/MacOS/Mineradio"
          if [ ! -x "$APP_BIN" ]; then
            echo "Missing mounted app binary: $APP_BIN"
            find "$VOLUME" -maxdepth 4 -type f | sort
            hdiutil detach "$VOLUME" || true
            exit 1
          fi

          export ELECTRON_ENABLE_LOGGING=1
          export ELECTRON_ENABLE_STACK_DUMPING=1
          "$APP_BIN" --enable-logging --v=1 --remote-debugging-port=9222 > mac-dmg-runtime.log 2>&1 &
          APP_PID=$!
          echo "APP_PID=$APP_PID"

          SERVER_OK=0
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:3000/ > dmg-home.html 2>> mac-dmg-runtime.log; then
              SERVER_OK=1
              break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "dmg app process exited before server was reachable"
              break
            fi
            sleep 1
          done
          echo "DMG_SERVER_OK=$SERVER_OK"

          if [ "$SERVER_OK" = "1" ]; then
            curl -sS -D dmg-login-status.headers http://127.0.0.1:3000/api/login/status -o dmg-login-status.json || true
            curl -sS -D dmg-qq-status.headers http://127.0.0.1:3000/api/qq/login/status -o dmg-qq-status.json || true
            curl -sS -D dmg-search.headers 'http://127.0.0.1:3000/api/search?keywords=test&limit=1' -o dmg-search.json || true
            node <<'NODE' > dmg-ui-diagnostic.json
          const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          async function waitForJson(url, timeoutMs) {
            const started = Date.now();
            let lastError;
            while (Date.now() - started < timeoutMs) {
              try {
                const res = await fetch(url);
                if (res.ok) return await res.json();
                lastError = new Error(`HTTP ${res.status}`);
              } catch (error) {
                lastError = error;
              }
              await wait(250);
            }
            throw lastError || new Error(`Timed out: ${url}`);
          }

          async function main() {
            const pages = await waitForJson('http://127.0.0.1:9222/json/list', 12000);
            const page = pages.find((item) => item.type === 'page' && item.webSocketDebuggerUrl);
            if (!page) throw new Error('No debuggable page found');
            const ws = new WebSocket(page.webSocketDebuggerUrl);
            const pending = new Map();
            let nextId = 1;
            const events = [];
            ws.addEventListener('message', (event) => {
              const msg = JSON.parse(event.data);
              if (msg.id && pending.has(msg.id)) {
                const { resolve, reject } = pending.get(msg.id);
                pending.delete(msg.id);
                if (msg.error) reject(new Error(msg.error.message || JSON.stringify(msg.error)));
                else resolve(msg.result);
              } else if (msg.method === 'Runtime.exceptionThrown' || msg.method === 'Runtime.consoleAPICalled') {
                events.push(msg);
              }
            });
            await new Promise((resolve, reject) => {
              ws.addEventListener('open', resolve, { once: true });
              ws.addEventListener('error', reject, { once: true });
            });
            function call(method, params = {}) {
              const id = nextId++;
              ws.send(JSON.stringify({ id, method, params }));
              return new Promise((resolve, reject) => pending.set(id, { resolve, reject }));
            }
            await call('Runtime.enable');
            await call('Page.enable');
            const expression = `new Promise(async (resolve) => {
              const wait = (ms) => new Promise((r) => setTimeout(r, ms));
              const out = {
                readyState: document.readyState,
                href: location.href,
                bodyClass: document.body && document.body.className,
                desktopWindow: !!window.desktopWindow,
                functions: {},
                search: null,
                loginModal: null,
                console: null
              };
              ['runHomeSearch','doSearch','showLoginModal','openHomePlayerConsole','goHome','openHomeLibrary'].forEach((name) => {
                out.functions[name] = typeof window[name];
              });
              try {
                window.runHomeSearch && window.runHomeSearch('test');
                await wait(2600);
                out.search = {
                  resultsShown: !!document.querySelector('#search-results.show'),
                  resultCount: document.querySelectorAll('#search-results .search-result').length,
                  text: (document.querySelector('#search-results')?.textContent || '').slice(0, 240)
                };
              } catch (error) {
                out.search = { error: error && (error.stack || error.message || String(error)) };
              }
              try {
                window.showLoginModal && await window.showLoginModal({ provider: 'netease', source: 'diagnostic' });
                await wait(600);
                const modal = document.querySelector('#login-modal');
                out.loginModal = {
                  exists: !!modal,
                  shown: !!(modal && modal.classList.contains('show')),
                  text: (modal?.textContent || '').slice(0, 240)
                };
                window.closeLoginModal && window.closeLoginModal();
              } catch (error) {
                out.loginModal = { error: error && (error.stack || error.message || String(error)) };
              }
              try {
                window.openHomePlayerConsole && window.openHomePlayerConsole();
                await wait(300);
                const bar = document.querySelector('#bottom-bar');
                out.console = {
                  exists: !!bar,
                  visible: !!(bar && bar.classList.contains('visible')),
                  className: bar ? bar.className : ''
                };
              } catch (error) {
                out.console = { error: error && (error.stack || error.message || String(error)) };
              }
              resolve(out);
            })`;
            const result = await call('Runtime.evaluate', {
              expression,
              awaitPromise: true,
              returnByValue: true,
              timeout: 15000
            });
            console.log(JSON.stringify({
              result: result.result && result.result.value,
              events: events.slice(-20)
            }, null, 2));
            ws.close();
          }

          main().catch((error) => {
            console.log(JSON.stringify({ error: error && (error.stack || error.message || String(error)) }, null, 2));
            process.exitCode = 1;
          });
          NODE
            cat dmg-ui-diagnostic.json
          fi

          sleep 4
          if kill -0 "$APP_PID" 2>/dev/null; then
            kill "$APP_PID" || true
          fi
          sleep 1
          hdiutil detach "$VOLUME" || true

          echo "===== mac-dmg-runtime.log tail ====="
          tail -240 mac-dmg-runtime.log || true
          echo "===== dmg home size ====="
          wc -c dmg-home.html 2>/dev/null || true
          echo "===== dmg login status ====="
          cat dmg-login-status.json 2>/dev/null || true
          echo
          echo "===== dmg qq status ====="
          cat dmg-qq-status.json 2>/dev/null || true
          echo
          echo "===== dmg search ====="
          head -c 1200 dmg-search.json 2>/dev/null || true
          echo
          echo "===== dmg ui diagnostic ====="
          cat dmg-ui-diagnostic.json 2>/dev/null || true
          echo

          test "$SERVER_OK" = "1"

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mac-runtime-diagnostics
          path: |
            mac-runtime.log
            mac-dmg-runtime.log
            home.html
            dmg-home.html
            *.headers
            *.json
          if-no-files-found: ignore
